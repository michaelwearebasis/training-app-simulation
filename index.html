<meta charset="utf-8">
<title>Basis Trade app demo</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
:root{
  --bg:#F9F5F1; --ink:#212629; --ink2:#4D5154; --ink3:#7A7D7F;
  --card:#FFFFFF; --line:#E7E0D7; --lime:#98FFAB; --pine:#134F4F; --chip:#EFEAE3;
}
@media (prefers-color-scheme: dark){
  :root{ --bg:#212629; --ink:#F4F4F5; --ink2:#C6CACB; --ink3:#9DA2A4;
    --card:#2B3236; --line:#3B4247; --chip:#343B40; }
}
:root[data-theme="dark"]{ --bg:#212629; --ink:#F4F4F5; --ink2:#C6CACB; --ink3:#9DA2A4;
  --card:#2B3236; --line:#3B4247; --chip:#343B40; }
:root[data-theme="light"]{ --bg:#F9F5F1; --ink:#212629; --ink2:#4D5154; --ink3:#7A7D7F;
  --card:#FFFFFF; --line:#E7E0D7; --chip:#EFEAE3; }
:root{
  --a-black:#000000; --a-bg:#1F2427; --a-panel:#141414; --a-card:#121517;
  --a-card2:#1D2124; --a-homecard:#43484C; --a-line:#31373B;
  --a-text:#FFFFFF; --a-t2:#9CA1A4; --a-t3:#70767A;
  --a-on:#FF5325; --a-cyan:#3ED9FF; --a-mint:#A9F5B5; --a-lilac:#CBCDFF;
  --a-fault:#F5A028; --a-red:#FF5325; --a-green:#30C558; --a-amber:#FFCC00; --a-lime:#98FFAB;
}
*{box-sizing:border-box; margin:0; padding:0}
[hidden]{display:none!important}
html,body{background:var(--bg); color:var(--ink);
  font-family:'Oracle','Inter',-apple-system,'Segoe UI',Roboto,sans-serif;
  -webkit-font-smoothing:antialiased}
button{font:inherit; color:inherit; background:none; border:0; cursor:pointer}
button:focus-visible{outline:3px solid var(--lime); outline-offset:2px}
img{max-width:100%}
b,strong{font-weight:600}

.wrap{max-width:1080px; margin:0 auto; padding:18px 14px 40px}
header.page{display:flex; flex-direction:column; gap:12px; margin-bottom:14px}
.brandrow{display:flex; align-items:center; gap:12px; flex-wrap:wrap}
.brandrow img{width:88px}
.brandrow img.logo-dark{display:none}
@media (prefers-color-scheme: dark){
  .brandrow img.logo-light{display:none}
  .brandrow img.logo-dark{display:block}
}
:root[data-theme="dark"] .brandrow img.logo-light{display:none!important}
:root[data-theme="dark"] .brandrow img.logo-dark{display:block!important}
:root[data-theme="light"] .brandrow img.logo-light{display:block!important}
:root[data-theme="light"] .brandrow img.logo-dark{display:none!important}
.pill{display:inline-block; background:var(--lime); color:#212629; border-radius:999px;
  padding:5px 13px; font-size:10.5px; letter-spacing:.08em; text-transform:uppercase; font-weight:500}
.hdr-actions{margin-left:auto; display:flex; gap:8px}
.hbtn{border:1px solid var(--line); background:var(--card); color:var(--ink2); border-radius:999px;
  padding:7px 13px; font-size:12px; font-weight:500}

.steps-hdr{position:sticky; top:0; z-index:80; background:var(--bg);
  padding:8px 0 10px; margin-bottom:12px; border-bottom:1px solid var(--line)}
.steps-row{display:flex; gap:6px; align-items:center; flex-wrap:wrap}
.pchip{display:inline-flex; align-items:center; gap:5px; background:var(--chip); color:var(--ink2);
  border-radius:999px; padding:5px 10px; font-size:11px; font-weight:500}
.pchip .n{width:14px; height:14px; border-radius:50%; background:var(--ink3); color:var(--bg);
  font-size:9px; display:inline-flex; align-items:center; justify-content:center; font-weight:600; flex:0 0 auto}
.pchip.cur{background:#212629; color:#fff}
.pchip.cur .n{background:var(--lime); color:#212629}
:root[data-theme="dark"] .pchip.cur{background:var(--lime); color:#212629}
:root[data-theme="dark"] .pchip.cur .n{background:#212629; color:var(--lime)}
@media (prefers-color-scheme: dark){
  :root:not([data-theme="light"]) .pchip.cur{background:var(--lime); color:#212629}
  :root:not([data-theme="light"]) .pchip.cur .n{background:#212629; color:var(--lime)}
}
.pchip.done .n{background:var(--lime); color:#212629}
.subchips{display:flex; gap:6px; flex-wrap:wrap; margin-top:8px}
.schip{background:var(--chip); color:var(--ink3); border-radius:999px; padding:4px 10px;
  font-size:11px; font-weight:500; display:inline-flex; gap:5px; align-items:center}
.schip.cur{background:#212629; color:var(--lime)}
:root[data-theme="dark"] .schip.cur{background:var(--lime); color:#212629}
@media (prefers-color-scheme: dark){
  :root:not([data-theme="light"]) .schip.cur{background:var(--lime); color:#212629}
}
.schip.done{color:var(--ink2)}
.schip.done::before{content:'✓'; color:#3fae5c; font-weight:700}

/* ---------- stage scales to fit any viewport: app + panel stay side by side ---------- */
#stagewrap{position:relative; margin:0 auto; overflow:visible}
.stage{display:flex; gap:34px; justify-content:center; align-items:stretch; width:748px;
  transform-origin:top left; position:relative}
.phone-wrap{flex:0 0 auto}
.panelcol{flex:0 0 322px; display:flex; flex-direction:column; gap:10px}
.panelcol .pw-eyebrow{justify-content:center}
.panelcol .punit{margin-top:auto; width:fit-content; align-self:center; max-width:100%; position:relative}
.punit > img{display:block; max-height:566px; width:auto; max-width:322px;
  filter:drop-shadow(0 18px 34px rgba(10,14,12,.35)); transition:filter .35s}
.punit.blurred > img{filter:blur(3px) brightness(.88) drop-shadow(0 18px 34px rgba(10,14,12,.35))}
#connector{position:absolute; inset:0; pointer-events:none; z-index:90; overflow:visible}
#connector path{fill:none; stroke:var(--a-lime); stroke-width:2.5; stroke-linecap:round;
  filter:drop-shadow(0 1px 4px rgba(20,60,30,.35))}
#connector .dot{fill:var(--a-lime)}

/* ---------- docked coach bubble ---------- */
.coach{background:var(--card); border:1px solid var(--line); border-radius:16px;
  padding:13px 15px 12px; overflow:hidden; min-height:0}
.coach .pill{font-size:9.5px; padding:4px 10px; margin-bottom:7px; display:inline-block}
.coach h3{font-size:14.5px; font-weight:500; letter-spacing:-.01em; margin-bottom:5px; text-wrap:balance}
.coach p{font-size:12px; line-height:1.5; color:var(--ink2)}
.coach.flash{animation:coachpop .6s cubic-bezier(.34,1.56,.64,1)}
@keyframes coachpop{0%{transform:scale(.97)} 45%{transform:scale(1.035); box-shadow:0 10px 30px rgba(152,255,171,.4)} 100%{transform:scale(1); box-shadow:none}}
.cnext{margin-top:10px; background:var(--a-lime); color:#101314; border:none; border-radius:999px;
  padding:8px 20px; font:inherit; font-size:12.5px; font-weight:700; cursor:pointer}
.cnext:disabled{background:var(--chip,#EFEAE3); color:var(--ink3,#83878A); cursor:default}
.cnext.ready{animation:hpulse 1.6s infinite}

/* ---------- modal (start + completion only) ---------- */
.pop-ov{position:fixed; inset:0; background:rgba(18,22,20,.55); z-index:200; display:flex;
  align-items:center; justify-content:center; padding:20px; backdrop-filter:blur(2px)}
.pop{background:var(--card); color:var(--ink); border-radius:18px; max-width:430px; width:100%;
  padding:24px 24px 20px; box-shadow:0 30px 80px rgba(10,14,12,.4); border:1px solid var(--line)}
.pop .pill{margin-bottom:12px}
.pop h3{font-size:21px; font-weight:500; letter-spacing:-.01em; margin-bottom:10px; text-wrap:balance}
.pop p{font-size:14px; line-height:1.55; color:var(--ink2)}
.pop .whylab{font-size:10.5px; letter-spacing:.09em; text-transform:uppercase; font-weight:600;
  color:var(--pine); margin:14px 0 5px}
:root[data-theme="dark"] .pop .whylab{color:var(--lime)}
@media (prefers-color-scheme: dark){ :root:not([data-theme="light"]) .pop .whylab{color:var(--lime)} }
.pop .pop-actions{display:flex; gap:10px; margin-top:18px}
.pop-go{background:#212629; color:#fff; border-radius:999px; padding:10px 22px; font-size:14.5px;
  font-weight:500; flex:1}
:root[data-theme="dark"] .pop-go{background:var(--lime); color:#212629}
@media (prefers-color-scheme: dark){ :root:not([data-theme="light"]) .pop-go{background:var(--lime); color:#212629} }
.pop-alt{background:var(--chip); color:var(--ink2); border-radius:999px; padding:10px 22px;
  font-size:14.5px; font-weight:500}

/* ---------- phone ---------- */
.phone{width:372px; height:738px; background:#0B0D0E; border-radius:52px; padding:9px;
  box-shadow:0 24px 60px rgba(20,25,20,.35), 0 2px 8px rgba(0,0,0,.25); position:relative}
.screen{position:relative; width:100%; height:100%; background:var(--a-bg); border-radius:44px;
  overflow:hidden; color:var(--a-text); display:flex; flex-direction:column}
.screen.on-black{background:var(--a-black)}
.island{position:absolute; top:11px; left:50%; transform:translateX(-50%); width:112px; height:30px;
  background:#0B0D0E; border-radius:999px; z-index:40}
.sbar{flex:0 0 52px; display:flex; align-items:flex-end; justify-content:space-between;
  padding:0 30px 4px; font-size:14px; font-weight:500; z-index:30}
.sbar svg{display:block}
.scr{flex:1 1 auto; overflow-y:auto; overflow-x:hidden; scrollbar-width:thin;
  scrollbar-color:#3a4045 transparent; display:flex; flex-direction:column}
.scr::-webkit-scrollbar{width:4px}
.scr::-webkit-scrollbar-thumb{background:#3a4045; border-radius:2px}
.tabbar{flex:0 0 62px; display:flex; border-top:1px solid #26292B; background:#1A1D1F; z-index:20}
.tabbar button{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:3px; font-size:10.5px; color:var(--a-t3)}
.tabbar button.on{color:#fff}
.tabbar svg{width:22px; height:22px}

/* ---------- in-app shared ---------- */
.nav{display:flex; align-items:center; gap:10px; padding:8px 16px 10px; min-height:44px}
.nav .ttl{font-size:16.5px; font-weight:500; flex:1; text-align:center; white-space:nowrap;
  overflow:hidden; text-overflow:ellipsis}
.nav .ttl.left{text-align:left; font-size:28px; letter-spacing:-.02em}
.icbtn{width:34px; height:34px; border-radius:50%; display:flex; align-items:center; justify-content:center;
  color:#fff; flex:0 0 auto}
.icbtn svg{width:20px; height:20px}
.avatar{width:32px; height:32px; border-radius:50%; background:#fff; color:#141414;
  font-weight:500; font-size:15px; display:flex; align-items:center; justify-content:center; flex:0 0 auto}
button.avatar{cursor:pointer}
.pad{padding:0 16px 18px}
.abtn{display:flex; width:100%; align-items:center; justify-content:center; gap:8px;
  border-radius:14px; min-height:52px; font-size:15.5px; font-weight:500}
.abtn.white{background:#fff; color:#141414}
.abtn.mint{background:var(--a-mint); color:#10241a}
.abtn.cyan{background:var(--a-cyan); color:#062733; font-weight:600}
.abtn.ghost{background:#2A2F33; color:#fff}
.abtn:disabled{opacity:.4}
.smallpill{border-radius:999px; padding:8px 18px; font-size:12.5px; font-weight:500;
  background:#fff; color:#141414}
.dotted{border-bottom:2px dotted #62686c; padding-bottom:3px}
.dotted.cyan{border-color:var(--a-cyan); color:var(--a-cyan)}
.uc{text-transform:uppercase; letter-spacing:.07em}
.tiny{font-size:10.5px; color:var(--a-t3)}
.req{color:#FF6A4D}
.toggle{width:46px; height:28px; border-radius:999px; background:#3A4045; position:relative;
  flex:0 0 auto; transition:background .15s}
.toggle::after{content:''; position:absolute; top:3px; left:3px; width:22px; height:22px; border-radius:50%;
  background:#fff; transition:left .15s}
.toggle.on{background:var(--a-green)}
.toggle.on::after{left:21px}
.chev{color:var(--a-t3)}
.hot{box-shadow:0 0 0 3px var(--a-lime), 0 0 20px rgba(152,255,171,.5)!important; position:relative; z-index:5}
.hot::before{content:''; position:absolute; top:-6px; right:-6px; width:13px; height:13px; border-radius:50%;
  background:var(--a-lime); box-shadow:0 0 0 0 rgba(152,255,171,.7); animation:hpulse 1.6s infinite; z-index:6}
@keyframes hpulse{0%{box-shadow:0 0 0 0 rgba(152,255,171,.7)} 70%{box-shadow:0 0 0 11px rgba(152,255,171,0)} 100%{box-shadow:0 0 0 0 rgba(152,255,171,0)}}
.toast{position:absolute; left:50%; transform:translateX(-50%); bottom:130px; background:#000000dd;
  color:#fff; font-size:12.5px; padding:9px 16px; border-radius:16px; z-index:60;
  opacity:0; transition:opacity .25s; pointer-events:none; width:max-content; max-width:86%;
  text-align:center; line-height:1.45}
.toast.show{opacity:1}
.snack{position:absolute; left:14px; right:14px; top:58px; background:#EAFAEB; color:#247636; z-index:55;
  border-radius:12px; padding:11px 15px; font-size:13px; font-weight:500; display:flex; gap:8px; align-items:center;
  animation:snackin .35s}
@keyframes snackin{from{transform:translateY(-12px); opacity:0} to{transform:none; opacity:1}}
.dots3{display:inline-flex; gap:5px; align-items:center}
.dots3 i{width:5px; height:5px; border-radius:50%; background:#8a9093; animation:d3 1.2s infinite}
.dots3 i:nth-child(2){animation-delay:.2s}
.dots3 i:nth-child(3){animation-delay:.4s}
.dots3.dark i{background:#3a4045}
@keyframes d3{0%,60%,100%{opacity:.25} 30%{opacity:1}}
.ringload{width:46px; height:46px; border-radius:50%; border:4px solid #33393D; border-top-color:var(--a-cyan);
  animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
<style>
/* ---------- home / connect ---------- */
.hcard{background:var(--a-homecard); border-radius:16px; padding:14px 14px 16px; position:relative;
  display:flex; flex-direction:column}
.hcard .serial{font-size:13.5px; font-weight:500; letter-spacing:.04em; color:#E4E7E8; margin-bottom:4px}
.hcard .imgwrap{display:flex; justify-content:center; position:relative; margin:0 -4px}
.hcard .imgwrap img{width:64%; border-radius:6px}
.hcard .overlays{position:absolute; left:0; right:0; bottom:10px; display:flex; flex-direction:column;
  gap:10px; align-items:center}
.hpill{background:#000000cc; color:#fff; border-radius:999px; padding:8px 15px; font-size:12px; font-weight:500}
.hcard .abtn{box-shadow:0 6px 18px rgba(0,0,0,.35)}
.dashes{display:flex; gap:7px; justify-content:center; margin-top:14px}
.dashes span{width:26px; height:4px; border-radius:2px; background:#33383B}
.dashes span.on{background:#fff}
.iosdim{position:absolute; inset:0; background:rgba(0,0,0,.35); z-index:30}
.iosalert{position:absolute; left:50%; top:44%; transform:translate(-50%,-50%); width:82%; z-index:31;
  background:rgba(44,46,48,.97); border-radius:22px; padding:20px 18px 16px;
  box-shadow:0 18px 50px rgba(0,0,0,.5)}
.iosalert .t{font-size:15.5px; font-weight:600; text-align:center; line-height:1.35}
.iosalert .btns{display:flex; gap:10px; margin-top:18px}
.iosalert .btns button{flex:1; border-radius:999px; min-height:42px; font-size:15px; font-weight:500}
.iosalert .cancel{background:#54565A; color:#fff}
.iosalert .join{background:#3E82F7; color:#fff; font-weight:600}
.pressonce h3{font-size:24px; font-weight:600; letter-spacing:-.01em; margin:6px 0 8px}
.pressonce p{font-size:13px; color:var(--a-t2); line-height:1.5}
.pressonce img{border-radius:10px; margin-top:18px}
/* ---------- dashboard ---------- */
.dash{flex:1; display:flex; flex-direction:column;
  background:linear-gradient(180deg,#191d20 0%, #21262a 40%, #1F2427 100%)}
.dash .addr{font-size:21px; font-weight:500; letter-spacing:-.01em; text-align:center; line-height:1.25;
  padding:8px 14px 0}
.dash .addr .addbtn{font-size:16px; color:#D6D9DA}
.dash .imgzone{flex:1; display:flex; align-items:center; justify-content:center; min-height:0; padding:6px 0 0}
.dash .imgzone img{width:56%; max-height:100%; object-fit:contain}
.statrow{display:flex; justify-content:space-between; padding:0 20px; margin:-26px 0 22px; position:relative}
.statrow .st{text-align:center}
.statrow .v{font-size:30px; font-weight:600; letter-spacing:-.02em; font-variant-numeric:tabular-nums}
.statrow .v small{font-size:13px; font-weight:500; color:var(--a-t2); margin-left:1px}
.statrow .l{font-size:9px; letter-spacing:.1em; text-transform:uppercase; color:var(--a-t3); margin-top:4px; font-weight:500}
.circbtns{display:flex; gap:44px; justify-content:center; padding-bottom:22px}
.circbtns button{display:flex; flex-direction:column; align-items:center; gap:10px; font-size:10px;
  letter-spacing:.1em; text-transform:uppercase; font-weight:500; color:#DFE2E3}
.circbtns .cc{width:64px; height:64px; border-radius:50%; background:#2A2F33; display:flex;
  align-items:center; justify-content:center}
.circbtns svg{width:26px; height:26px}
.banner{background:#000; border-radius:12px; padding:12px 14px; display:flex; align-items:center; gap:11px; margin:0 16px 4px}
.banner .bi{color:var(--a-lime); flex:0 0 auto; display:flex}
.banner .bt{flex:1; font-size:13.5px; font-weight:500; line-height:1.25}
.banner .bt small{display:block; font-weight:400; font-size:11px; color:var(--a-t3); margin-top:2px}
.banner .bbtn{background:var(--a-lime); color:#10241a; border-radius:999px; padding:8px 16px;
  font-size:13px; font-weight:500}
/* ---------- circuits list ---------- */
.bigtitle{font-size:38px; font-weight:600; letter-spacing:-.02em; text-align:center; margin:10px 0 22px}
.sumrow{display:flex; gap:10px; margin-bottom:18px}
.sumcard{flex:1; border:1px solid #3A4045; border-radius:12px; padding:12px 14px;
  display:flex; flex-direction:column; gap:10px}
.sumcard .r{display:flex; justify-content:space-between; align-items:baseline; font-size:12.5px; color:#D6D9DA}
.sumcard .r b{font-weight:600; font-size:13.5px; color:#fff; font-variant-numeric:tabular-nums}
.cgrid{display:grid; grid-template-columns:1fr 1fr; gap:10px}
.ctile{background:var(--a-card); border-radius:12px; padding:14px 14px 12px; text-align:left;
  display:flex; flex-direction:column; gap:6px; min-height:150px; position:relative; border:2px solid transparent}
.ctile .bar{position:absolute; top:34px; bottom:34px; width:5px; border-radius:3px; background:#33383C}
.ctile.colL .bar{left:7px}
.ctile.colR .bar{right:7px}
.ctile.on .bar{background:var(--a-on)}
.ctile.fault{border-color:var(--a-amber)}
.ctile.fault .bar{background:var(--a-amber)}
.ctile.fault .cload{color:var(--a-amber)}
.ctile .chead .fi{color:var(--a-amber); display:flex}
.ctile .chead{display:flex; justify-content:space-between; align-items:center;
  font-size:17px; font-weight:600; font-variant-numeric:tabular-nums; padding:0 10px}
.ctile .chead .sy{color:var(--a-cyan); display:flex}
.ctile .clab{font-size:16px; font-weight:400; padding:0 10px}
.ctile.pending .clab{color:var(--a-cyan)}
.ctile .tags{display:flex; gap:5px; flex-wrap:nowrap; padding:0 10px; overflow:hidden}
.ctag{background:#26292C; border-radius:999px; padding:5px 10px; font-size:8.5px; letter-spacing:.08em;
  text-transform:uppercase; color:#C7CBCC; font-weight:500}
.ctile .cload{margin-top:auto; padding:0 10px; font-size:13px; font-weight:600;
  font-variant-numeric:tabular-nums; color:var(--a-t3)}
.ctile .cload small{font-size:9.5px}
.ctile.on .cload{color:var(--a-on)}
.ctile.dim{opacity:.5}
.ctile.sel{border-color:var(--a-cyan); opacity:1}
.ctile .check{position:absolute; top:7px; right:7px; width:18px; height:18px; border-radius:50%;
  border:1.5px solid #5a6065; display:flex; align-items:center; justify-content:center}
.ctile.sel .check{background:var(--a-cyan); border-color:var(--a-cyan); color:#062733}
.syncall{position:absolute; right:14px; bottom:76px; z-index:24; display:flex; flex-direction:column;
  align-items:center; gap:5px}
.syncall .cc{width:64px; height:64px; border-radius:50%; background:#2A2F33cc; color:#84898C;
  display:flex; align-items:center; justify-content:center}
.syncall.live .cc{background:var(--a-cyan); color:#062733}
.syncall .lbl{font-size:9px; letter-spacing:.1em; font-weight:600; color:#84898C}
.syncall.live .lbl{color:var(--a-cyan)}
/* ---------- circuit detail ---------- */
.dsec{padding:16px; border-bottom:2px solid #191d20}
.dsec .lab{font-size:12.5px; color:var(--a-t2); margin-bottom:10px}
.dtop{display:flex; background:var(--a-panel); border-bottom:2px solid #191d20}
.dtop .cell-r{border-left:2px solid #23272a; display:flex; gap:12px}
.bigread{font-size:31px; font-weight:600; letter-spacing:-.01em; color:var(--a-on);
  font-variant-numeric:tabular-nums}
.bigread small{font-size:14px; font-weight:500}
.bigread.off{color:var(--a-t3)}
.statusbar-v{width:6px; border-radius:4px; background:var(--a-on); align-self:stretch; margin:2px 0}
.statusbar-v.off{background:#3A4045}
.dlabel{font-size:38px; font-weight:500; letter-spacing:-.01em; display:inline-block}
.dlabel.unset{color:var(--a-t2)}
.dvalrow{display:flex}

   DEV[n]   — config APPLIED on the device (what the e-ink shows), null = spare
   CST[n]   — runtime {live,devPending,fault}

let cur=0, fx={}, timers=[], freePlay=false, freeScr='circuits', activeCirc=1;
let CIRCS={}, DEV={}, CST={}, userCfgs={};
function T(fn,ms){timers.push(setTimeout(fn,ms))}
function TI(fn,ms){timers.push(setInterval(fn,ms))}
function clearT(){timers.forEach(t=>{clearTimeout(t);clearInterval(t)}); timers=[]}

const hm=s=>{s=Math.max(0,Math.round(s)); return Math.floor(s/3600)+'h '+String(Math.floor(s/60)%60).padStart(2,'0')+'m'};
const cst=n=>CST[n]||(CST[n]={live:false,devPending:false,fault:null});
const cfgEq=(a,b)=>JSON.stringify(a)===JSON.stringify(b);
const appPending=n=>!!CIRCS[n]&&!cfgEq(CIRCS[n],DEV[n]);
const pendingList=()=>Object.keys(CIRCS).map(Number).filter(appPending);

 1:{label:'Lights', mcb:'C 16A', rcd:'A 30mA', locs:['Bedroom 1','Ensuite 1'], afdd:false, mlc:false, stby:false},

 3:{label:'Power',  mcb:'B 20A', rcd:'A 30mA', locs:['Office'], afdd:false, mlc:false, stby:true}
};

function setF(n,f){ /* apply one config field: the learner's choice, else the storyline default */
  CIRCS[n]=CIRCS[n]||freshCfg();
  const u=userCfgs[n]||{};

}

function tileData(n){
  const c=CIRCS[n], d=DEV[n], s=cst(n);
  const shown=d||c;
  return {n, label:shown?(shown.label||'Spare'):'Spare',
    st:s.fault?'fault':(s.live?'on':'off'), a:s.live?'0.1':'0',
    pending:appPending(n),
    tags:(d&&d.locs&&d.locs.length)?[d.locs[0].toUpperCase()].concat(d.locs.length>1?['+'+(d.locs.length-1)]:[]):null};
}
function tile(c,opts){
  opts=opts||{};
  const col=c.n%2===1?'colL':'colR';
  const stCls=c.st==='on'?'on':c.st==='fault'?'fault':'off';
  const selMode=opts.selMode, sel=selMode&&opts.selSet.has(c.n);
  const dim=selMode&&!appPending(c.n)?' dim':'';
  const loadTxt=c.st==='fault'?`FAULT&nbsp; ${c.a}<small>A</small>`
    :c.st==='on'?`ON&nbsp; ${c.a}<small>A</small>`:`OFF&nbsp; ${c.a}<small>A</small>`;
  return `<button class="ctile ${col} ${stCls}${dim}${sel?' sel':''}${c.pending&&!selMode?' pending':''}${hot('circ'+c.n)}"
    data-act="${selMode?'selct':'opencirc'}" data-n="${c.n}">
    <span class="bar"></span>
    ${selMode?`<span class="check">${sel?I.check:''}</span>`:''}

    ${c.tags?`<span class="tags">${c.tags.map(t=>`<span class="ctag">${t}</span>`).join('')}</span>`:''}
    <span class="cload">${loadTxt}</span></button>`;
}

SCREENS.labelSheet=()=>{
  const sel=fx.selLabel;
  const common=['Lights','Power'];
  const all=['Air-Con','Alarm','EV Charger','Hob','HVAC','HWC','Oven','Pool','Range','Septic Pump','Solar','Spa'];
  const req=!freePlay&&steps[cur].require&&steps[cur].require[0]==='label'?steps[cur].require[1]:null;
  const btn=x=>`<button class="opt ${sel===x?'onw':''}${x===req?hot('optreq'):''}" data-act="picklabel" data-v="${x}">${x}</button>`;
  return {tab:null,html:sheetOver(`
  <div class="sheet">
    ${sheetHead('Select the label')}
    <div class="sbody">
      <div class="slab">What does this Circuit supply?<span class="chev">${I.search}</span></div>
      <div class="seclab">Common</div>
      <div class="optgrid">${common.map(btn).join('')}</div>
      <div class="seclab">All</div>
      <div class="optgrid">${all.map(btn).join('')}</div>
    </div>
    <div class="sfoot"><button class="abtn ${sel?'mint':'ghost'}${sel?hot('labelok'):''}" data-act="label-confirm" ${sel?'':'disabled'}>Confirm</button></div>
  </div>`)}};
SCREENS.mcbSheet=()=>{
  const cv=fx.mcbCurve, cr=fx.mcbRate;
  const rates=[2,4,6,10,16,20,25,32,40];
  const maxD=20; /* Type D tops out at 20A */
  const ready=cv&&cr;
  return {tab:null,html:sheetOver(`
  <div class="sheet">
    <div class="shead"><button class="icbtn" data-act="sheetclose" aria-label="Close">${I.close}</button>
      <b>MCB settings <span class="req">*</span></b>
      ${(cv||cr)?`<button data-act="mcb-reset" style="font-size:13.5px;color:var(--a-cyan);width:auto;padding:0 2px">Reset</button>`:'<span style="width:34px"></span>'}</div>
    <div class="sbody">
      <div class="slab">Trip-curve profile <span class="req">*</span></div>
      <div class="optgrid">${['B','C','D'].map((x,i)=>`<button class="opt ${cv===x?'onw':''} ${i===2?'wide':''}" data-act="mcb-curve" data-v="${x}">${x}</button>`).join('')}</div>
      <div class="slab">Current rating <span class="req">*</span></div>
      <div class="optgrid">${rates.map(r=>`<button class="opt ${cr===r?'onw':''}" data-act="mcb-rate" data-v="${r}" ${cv==='D'&&r>maxD?'disabled':''}>${r}A</button>`).join('')}</div>
      ${cv==='D'?'<div class="tiny" style="margin-top:-8px;margin-bottom:12px">Type D is available up to 20A.</div>':''}
    </div>
    <div class="sfoot"><button class="abtn ${ready?'mint':'ghost'}${ready?hot('mcbok'):''}" data-act="mcb-confirm" ${ready?'':'disabled'}>Confirm</button></div>
  </div>`)}};

SCREENS.syncApply=()=>{
  const list=[...fx.selSet], bulk=list.length>1;
  const allDone=list.every(n=>!cst(n).devPending);
  const left=fx.applyDeadline?(fx.applyDeadline-Date.now())/1000:1785;
  const row=n=>{
    const s=cst(n), nn=String(n).padStart(2,'0');
    return `<div class="syncrow"><b style="font-size:14px">Circuit ${nn}</b>
      ${!s.devPending
        ?`<span style="display:flex;gap:7px;align-items:center;color:var(--a-lime);font-size:13px;font-weight:500">Changes applied ${I.checkc}</span>`
        :`<span style="text-align:right;font-size:11.5px;color:var(--a-t2)">${bulk?'Apply within':'Power off within'}<br><span class="cd applycd" style="font-size:16px;color:#fff">${mmss(left)}</span></span>`}
    </div>`;
  };
  return {tab:null,html:`
  ${navbar('Syncing',{left:'none'})}
  <div class="pad" style="flex:1;padding-bottom:96px">
    ${stepHead(3,'Apply changes to the Smart Panel',"You need to interact with the Smart Panel, here's a quick reminder:")}
    <div class="instr-toggle"><span>Instructions</span><span class="chev">${I.chevd}</span></div>
    ${bulk?`<div class="icard">
      <p>1. Press the Basis Button within 30 minutes. This will cut power to all circuits and load the new configuration settings.</p>
      <p>2. Press the Basis Button a second time to power the circuits back up and apply the updates.</p>
    </div>`
    :`<div class="icard">
      <p>1. Turn OFF all affected circuits within 30 minutes.</p>
      <img src="${IMG_APPLY}" alt="Circuit e-ink display with its switch highlighted">
    </div>
    <div class="icard">
      <p>2. When you see the status light flash blue, press TEST or turn the circuits back ON within 30 minutes.</p>
      <span class="presstag"><span aria-hidden="true">↓</span> Press</span>
    </div>`}
    ${list.map(row).join('')}
    <p class="tiny" style="margin-top:14px;line-height:1.5;text-align:center">Any changes not applied in time will be removed from the Smart Panel - don't worry they'll remain pending on the app.</p>
  </div>
  <div class="floatbtn" style="bottom:16px">
    <button class="abtn ${allDone?'white':'ghost'}${allDone?hot('finish'):''}" data-act="finish" ${allDone?'':'disabled'}>Finish</button></div>`}};

SCREENS.fwInstall=()=>{
  const ph=fx.fwPhase||'start';
  let action='';
  if(ph==='start') action=`<div class="floatbtn" style="bottom:16px"><button class="abtn white${hot('fwinst')}" data-act="fwinst">Install update</button></div>`;
  if(ph==='press') action=`<div class="pad" style="text-align:center;padding-bottom:20px">
      <img src="${IMG_PRESS}" alt="Press the Basis Button" style="border-radius:10px;margin-bottom:12px">
      <b style="font-size:15.5px;font-weight:600;display:block">Press the Basis Button to install</b></div>`;
  if(ph==='installing') action=`<div class="pad" style="text-align:center;padding-bottom:24px">
      <div class="ringload" style="margin:0 auto 14px"></div>
      <b style="font-size:15.5px;font-weight:600">Hold on tight!</b>
      <div class="tiny" style="margin-top:4px">Things are working in the background</div>
      <div class="fwbarwrap" style="max-width:220px;margin:14px auto 0"><div class="fwbar" id="fwibar" style="width:8%"></div></div></div>`;
  if(ph==='done') action=`<div class="pad" style="text-align:center;padding-bottom:16px">
      <div style="color:var(--a-lime);display:flex;justify-content:center;margin-bottom:10px">${I.checkc.replace('width="18" height="18"','width="44" height="44"')}</div>
      <b style="font-size:15.5px;font-weight:600">Firmware installed</b></div>
    <div class="floatbtn" style="bottom:16px"><button class="abtn white${hot('fwdone')}" data-act="fwdone">Done</button></div>`;
  return {tab:null,html:`
  ${navbar('',{left:'none'})}
  <div class="pad" style="flex:1;padding-bottom:96px">
    <h3 style="font-size:24px;font-weight:600;letter-spacing:-.01em;margin:2px 0 8px">Install firmware</h3>
    <p style="font-size:13px;color:var(--a-t2);line-height:1.5">The firmware must now be installed on the panel.</p>
    <p class="tiny" style="margin-top:6px">This update may take up to 10 minutes. Please remain near the panel and on this screen until update is complete.</p>
    ${ph==='start'?fwVersions:''}
    <div style="height:18px"></div>${action}
  </div>`}};

/* ============ state derivation (jump-safe) ============ */
const clone=o=>o==null?null:JSON.parse(JSON.stringify(o));
function stateFor(i){
  const f={};
  CIRCS={}; DEV={}; CST={};
  f.addrSet=i>=11; f.showBanner=i>=4&&i<=7;
  if(i===6) f.fwdlDone=true;
  if(i===7){f.fwdlDone=true; f.fwPhase='press';}
  /* circuit 01 */
  if(i>=15) setF(1,'label');
  if(i>=17) setF(1,'mcb');
  if(i>=19) setF(1,'rcd');
  if(i>=21){setF(1,'locs'); setF(1,'afdd'); setF(1,'mlc'); setF(1,'stby');}
  if(i>=22&&i<=26) f.selSet=new Set([1]);
  if(i>=24&&i<=25) f.applyDeadline=Date.now()+1785*1000;
  if(i===24) cst(1).devPending=true;
  if(i>=25) DEV[1]=clone(CIRCS[1]);
  if(i>=26) cst(1).live=true;
  if(i===28){cst(1).fault='RCD'; cst(1).live=false;}
  if(i===29) f.snack='Changes applied';
  /* circuit 02 — HWC with AFDD + meter load control */
  if(i>=32) setF(2,'label');
  if(i>=34) setF(2,'mcb');
  if(i>=36){setF(2,'rcd'); setF(2,'locs'); setF(2,'stby');}
  if(i>=37) setF(2,'afdd');
  if(i>=38) setF(2,'mlc');
  /* circuit 03 — office power with standby lockout */
  if(i>=41) setF(3,'label');
  if(i>=43) setF(3,'mcb');
  if(i>=45) setF(3,'rcd');
  if(i>=47) setF(3,'locs');
  if(i>=48){setF(3,'stby'); setF(3,'afdd'); setF(3,'mlc');}
  /* circuit 19 — Solar; the RCD is deliberately never set */
  if(i>=52) setF(19,'label');
  if(i>=54){setF(19,'mcb'); setF(19,'locs'); setF(19,'afdd'); setF(19,'mlc'); setF(19,'stby');}
  /* keep any toggles the learner flipped early */
  [1,2,3,19].forEach(n=>{ if(CIRCS[n]&&userCfgs[n]) Object.keys(userCfgs[n]).forEach(fld=>{CIRCS[n][fld]=userCfgs[n][fld];}); });
  /* bulk sync */
  if(i>=58&&i<=62) f.selSet=new Set(pendingList());
  if(i===60||i===61){[...(f.selSet||[])].forEach(n=>cst(n).devPending=true); f.bulkPhase=i-59;}
  if(i===61){Object.keys(CST).forEach(n=>cst(+n).live=false); f.powerDown=true; f.bulkCharge=true;}
  if(i>=62){[2,3,19].forEach(n=>{ if(CIRCS[n]){DEV[n]=clone(CIRCS[n]); cst(n).devPending=false;} }); if(DEV[1]) cst(1).live=true;}
  if(i===63) f.snack='Changes applied';
  if(i>=64) cst(2).live=true;
  if(i>=65) cst(3).live=true;
  if(i===66){cst(2).fault='RCD'; cst(2).live=false;}   /* arrived after the guided trip test */
  if(i===73) f.expiry=Date.now()+43140*1000;
  f.selSet=f.selSet||new Set();
  return f;
}

const screenEl=$('#screen');
let toastEl=null, lastSig='', lastBubbleKey='', stageScale=1, lastEinkMap={};
function render(){
  clearT();
  if(!freePlay&&steps[cur].circ) activeCirc=steps[cur].circ;
  const scrKey=freePlay?freeScr:(fx.offSheet||steps[cur].screen);
  const scr=SCREENS[scrKey]();
  let html=scr.html;
  if(fx.showLoad) html+=loadOverlay();
  const sig=scrKey+'|'+cur+'|'+freePlay+'|'+activeCirc;
  const oldScr=screenEl.querySelector('.scr');
  const keepScroll=(sig===lastSig)&&oldScr?oldScr.scrollTop:0;
  screenEl.classList.toggle('on-black',!!scr.black);
  screenEl.innerHTML='<div class="island"></div>'
    +(scr.noBar?'':sbar())
    +`<div class="scr">${html}</div>`
    +(scr.tab?tabbar(scr.tab):'')
    +'<button class="scrollhint" id="scrollhint" hidden>⌄ Scroll down</button>'
    +'<div class="toast" id="toast"></div>';
  const newScr=screenEl.querySelector('.scr');
  if(newScr){ newScr.scrollTop=keepScroll; newScr.addEventListener('scroll',connSoon,{passive:true}); }
  /* sheet bodies scroll independently of .scr — track them too so the connector follows */
  screenEl.querySelectorAll('.sbody').forEach(el=>el.addEventListener('scroll',connSoon,{passive:true}));
  const sh=$('#scrollhint');
  if(sh) sh.addEventListener('click',()=>{
    const hotEl=screenEl.querySelector('.hot');
    const cont=(hotEl&&hotEl.closest('.sbody'))||newScr;
    if(cont) cont.scrollBy({top:260,behavior:'smooth'});
  });
  lastSig=sig;
  toastEl=$('#toast');
  renderStepper();
  renderBubble();
  renderPanel();
  drawConnector();
  if($('#d-amps')||$('#lv-amps')){
    TI(()=>{
      const on=cst(activeCirc).live&&!cst(activeCirc).fault;
      const a=on?(Math.random()<0.8?'0.1':'0.2'):'0.0';
      const v=String(238+Math.floor(Math.random()*3));
      ['d-amps','lv-amps'].forEach(id=>{const el=document.getElementById(id); if(el) el.textContent=a;});
      ['d-volts','lv-volts'].forEach(id=>{const el=document.getElementById(id); if(el) el.textContent=v;});
    },1100);
  }
  if(!freePlay) onEnter();
}
function onEnter(){
  const s=steps[cur];
  if(s.auto) T(()=>{if(steps[cur]===s)next();},s.auto);
  if(s.charge&&fx.bulkCharge){
    $('#pz-ring').classList.add('go');
    T(()=>{fx.bulkCharge=false; render();},2000);
  }
  if(s.screen==='syncApply'&&fx.applyDeadline){
    TI(()=>{document.querySelectorAll('.applycd').forEach(el=>el.textContent=mmss((fx.applyDeadline-Date.now())/1000));},1000);
  }
  if(s.screen==='fwDownload'&&!fx.fwdlDone){
    const t0=Date.now(),dur=3400;
    TI(()=>{
      const p=Math.min(1,(Date.now()-t0)/dur);
      const bar=$('#fwbar'),eta=$('#fweta');
      if(bar) bar.style.width=(p*100)+'%';
      if(eta) eta.textContent='Estimated time remaining: 0:'+String(Math.ceil((1-p)*14)).padStart(2,'0');
      if(p>=1){fx.fwdlDone=true; render();}
    },120);
  }
  if(s.screen==='fwInstall'&&fx.fwPhase==='installing'){
    const t0=Date.now(),dur=2600;
    TI(()=>{
      const p=Math.min(1,(Date.now()-t0)/dur);
      const bar=$('#fwibar'); if(bar) bar.style.width=(8+p*92)+'%';
      if(p>=1){fx.fwPhase='done'; render();}
    },120);
  }
  if(s.screen==='downloadPanelData'&&!fx.dlDone){
    const t0=Date.now(),dur=2200,C=2*Math.PI*49;
    TI(()=>{
      const p=Math.min(1,(Date.now()-t0)/dur);
      const ring=$('#dlring'); if(ring) ring.setAttribute('stroke-dashoffset',(C*(1-p)).toFixed(1));
      if(p>=1){fx.dlDone=true; render();}
    },80);
  }
  if(s.screen==='downloadedPanels'){
    TI(()=>{const el=$('#expcd'); if(el&&fx.expiry) el.textContent=hm((fx.expiry-Date.now())/1000);},1000);
  }
}
function goto(i){
  cur=Math.max(0,Math.min(steps.length-1,i));
  fx=stateFor(cur);
  render();
}
function next(){ if(cur<steps.length-1) goto(cur+1); }
function toast(msg){
  if(!toastEl) return;
  toastEl.textContent=msg; toastEl.classList.add('show');
  T(()=>toastEl&&toastEl.classList.remove('show'),2200);
}

/* stage scaling — phone + panel stay side by side on any screen */
function fitStage(){
  const stage=$('#stage'), wrap=$('#stagewrap');
  const vw=innerWidth||document.documentElement.clientWidth||748;
  const cw=document.querySelector('.wrap').clientWidth||vw;
  const avail=Math.max(300, Math.min(cw, vw-8));
  stageScale=Math.max(0.3, Math.min(1, avail/748));
  stage.style.transform=stageScale<1?`scale(${stageScale})`:'';
  wrap.style.width=Math.round(748*stageScale)+'px';
  wrap.style.height=Math.round(stage.offsetHeight*stageScale)+'px';
  drawConnector();
}
addEventListener('resize',fitStage);

let connRaf=0;

/* capture-phase catches every scroll container (.scr, sheet bodies) in one go */
document.addEventListener('scroll',connSoon,{capture:true,passive:true});
function drawConnector(){
  const svg=$('#connector'); if(!svg) return;
  svg.innerHTML='';
  const hint=$('#scrollhint'); if(hint) hint.hidden=true;
  if(freePlay) return;
  if(!POP[cur]) return;   /* only point at the action when the coach card has NEW text */
  let target=screenEl.querySelector('.hot');
  if(target){ /* clipped by its scroll container (sheet body or screen)? prompt a scroll instead */
    const scr=target.closest('.sbody')||screenEl.querySelector('.scr');
    if(scr){
      const a=target.getBoundingClientRect(), b=scr.getBoundingClientRect();
      if(a.top>b.bottom-8){ if(hint) hint.hidden=false; target=null; }
      else if(a.bottom<b.top+8) target=null;
    }
  }
  if(!target) target=document.querySelector('#pz-btn.need')
    ||document.querySelector('#sczoom .sc-testbtn.need')
    ||document.querySelector('#sczoom .sc-lever.need');
  if(!target) return;
  const sr=$('#stage').getBoundingClientRect();
  const L=r=>({x:(r.left-sr.left)/stageScale, y:(r.top-sr.top)/stageScale, w:r.width/stageScale, h:r.height/stageScale});
  const c=L($('#coach').getBoundingClientRect()), t=L(target.getBoundingClientRect());
  let sx,sy,ex,ey,path;
  if(t.x+t.w<c.x){ /* target in the phone, card on the right */
    sx=c.x; sy=c.y+Math.min(c.h-14,34); ex=t.x+t.w+8; ey=t.y+t.h/2;
    path=`M ${sx} ${sy} C ${sx-70} ${sy}, ${ex+70} ${ey}, ${ex} ${ey}`;
  } else { /* target on the panel below the card */
    sx=c.x+c.w*0.5; sy=c.y+c.h; ex=t.x+t.w/2; ey=t.y-8;
    path=`M ${sx} ${sy} C ${sx} ${sy+50}, ${ex} ${ey-50}, ${ex} ${ey}`;
  }
  svg.setAttribute('viewBox',`0 0 ${sr.width/stageScale} ${sr.height/stageScale}`);
  svg.style.width='100%'; svg.style.height='100%';
  const p=document.createElementNS('http://www.w3.org/2000/svg','path');
  p.setAttribute('d',path);
  const len=Math.hypot(ex-sx,ey-sy)*1.4;
  p.setAttribute('stroke-dasharray',len);
  p.setAttribute('stroke-dashoffset',len);
  p.style.transition='stroke-dashoffset .55s ease-out .15s';
  svg.appendChild(p);
  const dot=document.createElementNS('http://www.w3.org/2000/svg','circle');
  dot.setAttribute('class','dot'); dot.setAttribute('r','4'); dot.setAttribute('cx',sx); dot.setAttribute('cy',sy);
  svg.appendChild(dot);
  requestAnimationFrame(()=>p.setAttribute('stroke-dashoffset','0'));
}

    case 'syncsel': go('syncUpload');
      T(()=>{[...fx.selSet].forEach(n=>cst(n).devPending=true);
        fx.applyDeadline=Date.now()+1785*1000; freeScr='syncApply'; render();
        TI(()=>{document.querySelectorAll('.applycd').forEach(e2=>e2.textContent=mmss((fx.applyDeadline-Date.now())/1000));},1000);
      },2000); return;
    case 'synccancel': return go('circuits');
    case 'finish': fx.snack='Changes applied'; go('circuits'); fx.snack=null; return;
    case 'openevent': return go('eventDetail');
    case 'evback': return go('events');
    case 'reportbug': case 'sharefb': return toast('In the real app this opens a report form');
    case 'scanicon': return toast('Scanning is part of the guided offline part — Restart to run it again');
    case 'addprop': return toast('Site details are already set for this board');
    default: return toast('Free play — explore the app, or work the Circuit Module on the right');
  }
}
screenEl.addEventListener('click',e=>{
  const el=e.target.closest('[data-act]'); if(!el) return;
  const act=el.dataset.act;
  if(act==='activeload'||act==='loadback'){pickHandlers(act,el); return;}
  if(freePlay){ freeAct(act,el); return; }
  const s=steps[cur];
  const adv=Array.isArray(s.advanceOn)?s.advanceOn.includes(act):act===s.advanceOn;
  /* toggles flip freely in guided mode; the coach card's Next button advances, never the toggle */
  if(act==='tg-afd'||act==='tg-ml'||act==='tg-sl'){
    const fld=act==='tg-afd'?'afdd':act==='tg-ml'?'mlc':'stby';
    saveCfg(fld,!(CIRCS[activeCirc]||{})[fld]);
    render(); return;
  }
  /* mid-guided config edits: any detail row opens its sheet as an overlay, no step change */
  if(!adv&&(act==='openlabel'||act==='openmcb'||act==='openrcd'||act==='openloc')&&!fx.offSheet){
    seedPickers(act);
    fx.offSheet={openlabel:'labelSheet',openmcb:'mcbSheet',openrcd:'rcdSheet',openloc:'locSheet'}[act];
    render(); return;
  }
  if(fx.offSheet){
    const cvo=confirmVal(act);
    if(cvo){ saveCfg(cvo[0],cvo[1]); fx.offSheet=null; render(); return; }
    if(act==='sheetclose'){ fx.offSheet=null; render(); return; }
  }
  if(adv){
    if(act==='connect'){fx.connecting=true; render(); T(()=>next(),1300); return;}
    if(act==='opencirc'&&+el.dataset.n!==s.circ){toast('Open circuit '+String(s.circ).padStart(2,'0')+' — it has the lime highlight'); return;}
    const cv=confirmVal(act);
    if(cv){
      if(s.require){
        const [fld,val]=s.require;
        const ok=fld==='locs'?(cv[1]||[]).includes(val):cv[1]===val;
        if(!ok){toast('For this circuit, pick '+val); return;}
      }
      saveCfg(cv[0],cv[1]); next(); return;
    }
    if(act==='reportbug'||act==='sharefb'){showDone(); return;}
    next(); return;
  }
  if(pickHandlers(act,el)) return;
  if(act==='sheetclose'){goto(cur-1); return;}   /* X on a scripted sheet returns to the step behind it */
  if(act==='fwdl'&&cur!==4){goto(4); return;}
  if(act==='selct'){toast('This selection is set for the guided sync'); return;}
  if(act==='allspare'||act==='alldiscard'||act==='setspare'||act==='discardpend'){
    toast('These work for real in free play — after the walkthrough'); return;
  }
  if(act==='circmenu'){toast('The ⋮ menus come up in part 6 — follow the lime highlight for now'); return;}
  toast('Follow the lime highlight — or check the coach card');
});

/* seed pickers whenever a guided sheet step is entered */
const _goto=goto;
goto=function(i){
  cur=Math.max(0,Math.min(steps.length-1,i));
  fx=stateFor(cur);
  if(steps[cur].circ) activeCirc=steps[cur].circ;
  const scrn=steps[cur].screen;
  if(scrn==='labelSheet') seedPickers('openlabel');
  if(scrn==='mcbSheet') seedPickers('openmcb');
  if(scrn==='rcdSheet') seedPickers('openrcd');
  if(scrn==='locSheet') seedPickers('openloc');
  render();
};

/* boot */
fitStage();
{
  const deep=new URLSearchParams(location.search).get('step');
  goto(deep===null?0:+deep);
  fitStage();
  if(deep===null) showStart();
}
</script>
