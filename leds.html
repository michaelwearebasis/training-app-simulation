<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Basis — what the lights mean</title>
<style>
:root{
  --ink:#1E1E1F; --ink2:#5B5E60; --ink3:#8A8D8F; --line:#EAEAEB;
  --led-red:#FF3B2E; --led-yellow:#FFC400; --led-blue:#2F6BFF;
}
*{box-sizing:border-box; margin:0; padding:0}
body{background:#fff; color:var(--ink);
  font-family:'Oracle','Inter',-apple-system,'Segoe UI',Roboto,sans-serif;
  -webkit-font-smoothing:antialiased; line-height:1.4; padding:22px 16px 34px}
.wrap{max-width:820px; margin:0 auto}

/* LED pills */
.hold{display:inline-flex; align-items:center; justify-content:center; background:#22272B; border-radius:8px; padding:6px; flex:0 0 auto}
.led{border-radius:999px}
.led.v{width:8px; height:24px}
.led.h{width:28px; height:9px}
.red{background:linear-gradient(var(--led-red),#d92417); box-shadow:0 0 9px 1px rgba(255,59,46,.6)}
.yellow{background:linear-gradient(#ffd23a,var(--led-yellow)); box-shadow:0 0 9px 1px rgba(255,196,0,.55)}
.blue{background:linear-gradient(#5a86ff,var(--led-blue)); box-shadow:0 0 9px 1px rgba(47,107,255,.65)}
.white{background:linear-gradient(#fff,#e6e9ec); box-shadow:0 0 9px 1px rgba(255,255,255,.8)}
.off{background:#3a4045}
@keyframes blink1{0%,49.9%{opacity:1}50%,100%{opacity:.10}}
.blink1{animation:blink1 2s steps(1,end) infinite}
@keyframes blinkfast{0%,49.9%{opacity:1}50%,100%{opacity:.10}}
.blinkfast{animation:blinkfast .5s steps(1,end) infinite}
@keyframes breatheRed{0%{opacity:1}43%{opacity:.06}86%{opacity:.06}100%{opacity:1}}
.breatheRed{animation:breatheRed 3.5s ease-in-out infinite}
@keyframes breatheWhite{0%{opacity:.14}23%{opacity:1}46%{opacity:1}69%{opacity:.14}100%{opacity:.14}}
.breatheWhite{animation:breatheWhite 6.5s ease-in-out infinite}

/* bands */
.band{display:grid; grid-template-columns:280px 1fr; gap:24px; align-items:center; padding:18px 0; border-bottom:1px solid var(--line)}
.band:last-child{border-bottom:0}
.thumb svg{width:100%; height:auto; display:block; border-radius:10px}
.colhead{font-size:15px; font-weight:700; margin:0 0 6px}
.sub{font-size:11px; font-weight:700; letter-spacing:.07em; text-transform:uppercase; color:var(--ink3); margin:0 0 3px}
.g2{display:grid; grid-template-columns:1fr 1fr; gap:0 24px}
.brain2{display:grid; grid-template-columns:1fr 1fr; gap:24px}
.r{display:flex; gap:11px; align-items:center; padding:7px 0; border-bottom:1px solid var(--line)}
.r:last-child{border-bottom:0}
.txt b{font-size:12.5px; font-weight:650; display:block}
.txt .m{color:var(--ink2); font-size:11.5px; line-height:1.3}
.einktxt{font-family:'DM Mono',ui-monospace,'Cascadia Mono','Roboto Mono',Consolas,monospace; fill:#EDEDEA}

@media (max-width:560px){ .band{grid-template-columns:1fr} .g2,.brain2{grid-template-columns:1fr} }
</style>
</head>
<body>
<div class="wrap">

  <!-- Circuit band -->
  <div class="band">
    <div class="thumb">
      <svg viewBox="0 0 412 224" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="steel" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0" stop-color="#565D63"/><stop offset=".5" stop-color="#3B4248"/><stop offset="1" stop-color="#2A3035"/>
          </linearGradient>
          <linearGradient id="btn" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#2A2F33"/><stop offset="1" stop-color="#14181A"/>
          </linearGradient>
        </defs>
        <rect x="8" y="14" width="404" height="200" rx="15" fill="#0B0D0E" stroke="#d5d8da" stroke-width="1.5"/>
        <text x="24" y="34" font-size="9" letter-spacing="2" fill="#8b9194">CIRCUIT 01</text>
        <rect x="24" y="46" width="62" height="156" rx="11" fill="#0f1214" stroke="#22282b"/>
        <rect x="31" y="53" width="48" height="142" rx="7" fill="url(#steel)" stroke="#5c646a"/>
        <line x1="41" y1="66" x2="41" y2="182" stroke="#282f34" stroke-width="2"/>
        <line x1="51" y1="66" x2="51" y2="182" stroke="#282f34" stroke-width="2"/>
        <line x1="61" y1="66" x2="61" y2="182" stroke="#282f34" stroke-width="2"/>
        <line x1="71" y1="66" x2="71" y2="182" stroke="#282f34" stroke-width="2"/>
        <rect x="100" y="46" width="206" height="156" rx="8" fill="#000" stroke="#1c2224"/>
        <text class="einktxt" x="114" y="72" font-size="16" font-weight="500">Power</text>
        <text class="einktxt" x="292" y="72" font-size="14" text-anchor="end" fill="#9aa0a3">01</text>
        <text class="einktxt" x="114" y="108" font-size="26" font-weight="500">ON</text>
        <text class="einktxt" x="114" y="146" font-size="13">MCB</text>
        <text class="einktxt" x="172" y="146" font-size="13">C25</text>
        <text class="einktxt" x="114" y="166" font-size="13">RCD</text>
        <text class="einktxt" x="172" y="166" font-size="13">A30mA</text>
        <text class="einktxt" x="114" y="186" font-size="13">AFDD</text>
        <text class="einktxt" x="172" y="186" font-size="13" fill="#9aa0a3">OFF</text>
        <rect x="326" y="48" width="24" height="20" rx="5" fill="url(#btn)" stroke="#33393d"/>
        <rect x="330" y="78" width="17" height="120" rx="8.5" fill="var(--led-red)" style="filter:drop-shadow(0 0 5px rgba(255,59,46,.85))"/>
      </svg>
    </div>
    <div>
      <div class="colhead">Each circuit</div>
      <div class="g2" id="circList"></div>
    </div>
  </div>

  <!-- Brain band -->
  <div class="band">
    <div class="thumb">
      <svg viewBox="0 0 300 192" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="rbtn" cx="42%" cy="34%" r="70%">
            <stop offset="0" stop-color="#3A4147"/><stop offset=".55" stop-color="#20262A"/><stop offset="1" stop-color="#0C0F11"/>
          </radialGradient>
        </defs>
        <rect x="8" y="10" width="284" height="172" rx="16" fill="#0B0D0E" stroke="#d5d8da" stroke-width="1.5"/>
        <!-- Basis Button centered above the lights -->
        <circle cx="150" cy="46" r="24" fill="url(#rbtn)" stroke="#3a4045" stroke-width="1.5"/>
        <ellipse cx="144" cy="39" rx="11" ry="7" fill="#ffffff" opacity=".07"/>
        <!-- Status -->
        <text x="30" y="107" font-size="11" letter-spacing="1.4" font-weight="600" fill="#17B7CE">STATUS</text>
        <rect x="110" y="96" width="80" height="17" rx="8.5" fill="#2b3236"/>
        <rect x="110" y="96" width="80" height="17" rx="8.5" fill="#ffffff" style="filter:drop-shadow(0 0 5px rgba(255,255,255,.9))"/>
        <!-- Comms -->
        <text x="30" y="149" font-size="11" letter-spacing="1.4" font-weight="600" fill="#17B7CE">COMMS</text>
        <rect x="110" y="138" width="80" height="17" rx="8.5" fill="#2b3236"/>
        <rect x="110" y="138" width="80" height="17" rx="8.5" fill="var(--led-blue)" style="filter:drop-shadow(0 0 5px rgba(47,107,255,.9))"/>
      </svg>
    </div>
    <div>
      <div class="colhead">The panel's brain</div>
      <div class="brain2">
        <div><div class="sub">Status light</div><div id="statusList"></div></div>
        <div><div class="sub">Comms light</div><div id="commsList"></div></div>
      </div>
    </div>
  </div>

</div>

<script>
'use strict';
const CIRC=[
 ['v','red','','Solid red','Live — power on'],
 ['v','red','breatheRed','Pulsing red','Standby — off from the app'],
 ['v','off','','Off','Safe — nothing live'],
 ['v','yellow','','Solid yellow','Tripped — electrical fault'],
 ['v','blue','blink1','Blinking blue','Change waiting to apply'],
 ['v','yellow','blink1','Blinking yellow','Module needs attention'],
];
const STATUS=[
 ['h','white','breatheWhite','Breathing white','Running normally'],
 ['h','blue','blink1','Blinking blue','Press the Basis Button'],
 ['h','white','blink1','Blinking white','Starting up'],
 ['h','yellow','blinkfast','Fast blinking yellow','Updating software'],
];
const COMMS=[
 ['h','white','','Solid white','Online'],
 ['h','white','blink1','Blinking white','Connecting…'],
 ['h','blue','','Solid blue','Phone connected'],
 ['h','blue','blink1','Blinking blue','Hotspot on, waiting'],
 ['h','yellow','blink1','Blinking yellow','Can’t connect'],
 ['h','off','','Off','No network'],
];
const row=it=>`<div class="r"><span class="hold"><i class="led ${it[0]} ${it[1]} ${it[2]}"></i></span>
  <span class="txt"><b>${it[3]}</b><span class="m">${it[4]}</span></span></div>`;
document.getElementById('circList').innerHTML=CIRC.map(row).join('');
document.getElementById('statusList').innerHTML=STATUS.map(row).join('');
document.getElementById('commsList').innerHTML=COMMS.map(row).join('');
</script>
</body>
</html>
