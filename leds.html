<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Basis — what the lights mean</title>
<style>
:root{
  --ink:#1E1E1F; --ink2:#5B5E60; --ink3:#8A8D8F; --line:#EAEAEB;
  --led-red:#FF3B2E; --led-yellow:#FFC400; --led-blue:#2F6BFF;
}
*{box-sizing:border-box; margin:0; padding:0}
body{background:#fff; color:var(--ink);
  font-family:'Oracle','Inter',-apple-system,'Segoe UI',Roboto,sans-serif;
  -webkit-font-smoothing:antialiased; line-height:1.4; padding:22px 16px 40px}
.wrap{max-width:820px; margin:0 auto}
.tip{font-size:12.5px; color:var(--ink3); margin-bottom:16px}

.red{background:linear-gradient(var(--led-red),#d92417); box-shadow:0 0 9px 1px rgba(255,59,46,.6)}
.yellow{background:linear-gradient(#ffd23a,var(--led-yellow)); box-shadow:0 0 9px 1px rgba(255,196,0,.55)}
.blue{background:linear-gradient(#5a86ff,var(--led-blue)); box-shadow:0 0 9px 1px rgba(47,107,255,.65)}
.white{background:linear-gradient(#fff,#e6e9ec); box-shadow:0 0 9px 1px rgba(255,255,255,.8)}
.off{background:#3a4045; box-shadow:none}
@keyframes blink1{0%,49.9%{opacity:1}50%,100%{opacity:.10}}
.blink1{animation:blink1 2s steps(1,end) infinite}
@keyframes blinkfast{0%,49.9%{opacity:1}50%,100%{opacity:.10}}
.blinkfast{animation:blinkfast .5s steps(1,end) infinite}
@keyframes breatheRed{0%{opacity:1}43%{opacity:.06}86%{opacity:.06}100%{opacity:1}}
.breatheRed{animation:breatheRed 3.5s ease-in-out infinite}
@keyframes breatheWhite{0%{opacity:.14}23%{opacity:1}46%{opacity:1}69%{opacity:.14}100%{opacity:.14}}
.breatheWhite{animation:breatheWhite 6.5s ease-in-out infinite}

.viewer{position:relative; width:100%; max-width:320px}
.viewer svg{display:block; width:100%; height:auto; border-radius:10px}
.ov{position:absolute; border-radius:999px}
.ovC{left:80.1%; top:34.8%; width:4.2%; height:53.6%}
.ovS{left:36.7%; top:50%; width:26.7%; height:8.9%}
.ovM{left:36.7%; top:71.9%; width:26.7%; height:8.9%}
.hint{position:absolute; font-size:9px; font-weight:700; letter-spacing:.1em; color:#17B7CE}
.hint.s{left:9%; top:52%} .hint.m{left:9%; top:74%}

.dot{display:inline-block; border-radius:999px; flex:0 0 auto}
.dot.v{width:7px; height:16px}
.pip{border-radius:999px; width:18px; height:6px}
.mbtn{display:inline-flex; align-items:center; gap:9px; border:1px solid var(--line); background:#fff;
  border-radius:12px; padding:8px 13px 8px 10px; font:inherit; font-size:13px; font-weight:600; color:var(--ink); cursor:pointer}
.mbtn .hold{display:inline-flex; align-items:center; justify-content:center; background:#22272B; border-radius:6px; padding:4px 5px}
.mbtn:hover{border-color:#c7cacc}
.mbtn.sel{border-color:var(--ink); box-shadow:0 0 0 1px var(--ink)}
.list{display:flex; flex-direction:column; gap:8px; align-items:stretch}
.list .mbtn{width:100%; justify-content:flex-start}
.pips{display:inline-flex; flex-direction:column; gap:3px; margin-left:auto; padding-left:12px; align-items:flex-end}
.cap{font-size:13px; color:var(--ink2); margin-top:12px; min-height:34px}
.cap b{color:var(--ink)}
.colhead{font-size:15px; font-weight:700; margin:0 0 8px}

.two{display:grid; grid-template-columns:1fr 1fr; gap:28px; align-items:start}
.einktxt{font-family:'DM Mono',ui-monospace,'Cascadia Mono','Roboto Mono',Consolas,monospace; fill:#EDEDEA}
@media (max-width:600px){ .two{grid-template-columns:1fr} }
</style>
</head>
<body>

<svg style="position:absolute;width:0;height:0;overflow:hidden" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="steel" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#565D63"/><stop offset=".5" stop-color="#3B4248"/><stop offset="1" stop-color="#2A3035"/></linearGradient>
    <linearGradient id="btn" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#2A2F33"/><stop offset="1" stop-color="#14181A"/></linearGradient>
    <radialGradient id="rbtn" cx="42%" cy="34%" r="70%"><stop offset="0" stop-color="#3A4147"/><stop offset=".55" stop-color="#20262A"/><stop offset="1" stop-color="#0C0F11"/></radialGradient>
  </defs>
  <symbol id="cb" viewBox="0 0 412 224">
    <rect x="8" y="14" width="404" height="200" rx="15" fill="#0B0D0E" stroke="#d5d8da" stroke-width="1.5"/>
    <text x="24" y="34" font-size="9" letter-spacing="2" fill="#8b9194">CIRCUIT 01</text>
    <rect x="24" y="46" width="62" height="156" rx="11" fill="#0f1214" stroke="#22282b"/>
    <rect x="31" y="53" width="48" height="142" rx="7" fill="url(#steel)" stroke="#5c646a"/>
    <line x1="41" y1="66" x2="41" y2="182" stroke="#282f34" stroke-width="2"/><line x1="51" y1="66" x2="51" y2="182" stroke="#282f34" stroke-width="2"/>
    <line x1="61" y1="66" x2="61" y2="182" stroke="#282f34" stroke-width="2"/><line x1="71" y1="66" x2="71" y2="182" stroke="#282f34" stroke-width="2"/>
    <rect x="100" y="46" width="206" height="156" rx="8" fill="#000" stroke="#1c2224"/>
    <text class="einktxt" x="114" y="72" font-size="16" font-weight="500">Power</text>
    <text class="einktxt" x="292" y="72" font-size="14" text-anchor="end" fill="#9aa0a3">01</text>
    <text class="einktxt" x="114" y="108" font-size="26" font-weight="500">ON</text>
    <text class="einktxt" x="114" y="146" font-size="13">MCB</text><text class="einktxt" x="172" y="146" font-size="13">C25</text>
    <text class="einktxt" x="114" y="166" font-size="13">RCD</text><text class="einktxt" x="172" y="166" font-size="13">A30mA</text>
    <text class="einktxt" x="114" y="186" font-size="13">AFDD</text><text class="einktxt" x="172" y="186" font-size="13" fill="#9aa0a3">OFF</text>
    <rect x="326" y="48" width="24" height="20" rx="5" fill="url(#btn)" stroke="#33393d"/>
    <rect x="330" y="78" width="17" height="120" rx="8.5" fill="#2b3236"/>
  </symbol>
  <symbol id="sb" viewBox="0 0 300 192">
    <rect x="8" y="10" width="284" height="172" rx="16" fill="#0B0D0E" stroke="#d5d8da" stroke-width="1.5"/>
    <circle cx="150" cy="46" r="24" fill="url(#rbtn)" stroke="#3a4045" stroke-width="1.5"/>
    <ellipse cx="144" cy="39" rx="11" ry="7" fill="#ffffff" opacity=".07"/>
    <rect x="110" y="96" width="80" height="17" rx="8.5" fill="#2b3236"/>
    <rect x="110" y="138" width="80" height="17" rx="8.5" fill="#2b3236"/>
  </symbol>
</svg>

<div class="wrap">
  <div class="tip">Tap a mode or a situation — the light on the picture shows it.</div>
  <div class="two">
    <div>
      <div class="colhead">Each circuit</div>
      <div class="viewer" style="margin-bottom:14px"><svg viewBox="0 0 412 224"><use href="#cb"/></svg><span class="ov ovC" id="c-C"></span></div>
      <div class="list" id="circList"></div>
      <div class="cap" id="c-capC"></div>
    </div>
    <div>
      <div class="colhead">Panel</div>
      <div class="viewer" style="margin-bottom:14px"><svg viewBox="0 0 300 192"><use href="#sb"/></svg><span class="hint s">STATUS</span><span class="hint m">COMMS</span><span class="ov ovS" id="b-S"></span><span class="ov ovM" id="b-M"></span></div>
      <div class="list" id="sitList"></div>
      <div class="cap" id="b-capS"></div>
    </div>
  </div>
</div>

<script>
'use strict';
/* circuit modes — grouped, plus an explicit "No light" state */
const CMODES=[
 {n:'Power',    dot:{cls:'red',anim:''},        cap:'<b>Power</b> — the circuit is live (steady red), or slowly pulsing red when it’s on standby.'},
 {n:'Fault',    dot:{cls:'yellow',anim:''},      cap:'<b>Fault</b> — solid yellow when it’s tripped; slow-blinking yellow if the module itself needs attention.'},
 {n:'Waiting',  dot:{cls:'blue',anim:'blink1'},  cap:'<b>Waiting</b> — blinking blue: a change is staged and waiting to apply.'},
 {n:'No light', dot:{cls:'off',anim:''},         cap:'<b>No light</b> — the circuit is off, safe, or a spare position that isn’t in use.'},
];
/* the six real combined System Manager situations (Status + Comms together) */
const SIT=[
 {n:'Starting up',          S:{cls:'white',anim:'blink1'},      M:{cls:'off',anim:''},          mean:'Powering up — nothing else is lit yet.'},
 {n:'All good, online',     S:{cls:'white',anim:'breatheWhite'},M:{cls:'white',anim:''},        mean:'Running normally and connected to the internet.'},
 {n:'All good, no internet',S:{cls:'white',anim:'breatheWhite'},M:{cls:'yellow',anim:'blink1'}, mean:'Running fine locally, but can’t reach the internet.'},
 {n:'Getting connected',    S:{cls:'white',anim:'breatheWhite'},M:{cls:'white',anim:'blink1'},  mean:'Joining the network — Comms turns solid blue when your phone connects.'},
 {n:'Waiting for you',      S:{cls:'blue',anim:'blink1'},       M:{cls:'blue',anim:''},          mean:'Press the Basis Button — your phone is on the panel to apply changes or pair.'},
 {n:'Updating',             S:{cls:'yellow',anim:'blinkfast'},  M:{cls:'white',anim:''},         mean:'Installing a software update — leave it for a minute.'},
];

function setRaw(light,m){ const el=document.getElementById((light==='C'?'c-':'b-')+light); if(el) el.className='ov ov'+light+' '+m.cls+(m.anim?' '+m.anim:''); }
function cap(id,html){document.getElementById(id).innerHTML=html;}
function selWithin(btn){ btn.parentElement.querySelectorAll('.mbtn').forEach(x=>x.classList.remove('sel')); btn.classList.add('sel'); }

const cdot=m=>`<span class="hold"><span class="dot v ${m.cls} ${m.anim}"></span></span>`;
const pip=m=>`<span class="pip ${m.cls} ${m.anim}"></span>`;

document.getElementById('circList').innerHTML=CMODES.map((m,i)=>`<button class="mbtn" data-c="${i}">${cdot(m.dot)}${m.n}</button>`).join('');
document.getElementById('sitList').innerHTML=SIT.map((s,i)=>`<button class="mbtn" data-s="${i}">${s.n}<span class="pips">${pip(s.S)}${pip(s.M)}</span></button>`).join('');

addEventListener('click',e=>{
  const b=e.target.closest('[data-c],[data-s]'); if(!b) return;
  if(b.dataset.c!==undefined){ const m=CMODES[+b.dataset.c]; setRaw('C',m.dot); cap('c-capC',m.cap); selWithin(b); }
  else { const s=SIT[+b.dataset.s]; setRaw('S',s.S); setRaw('M',s.M); cap('b-capS',`<b>${s.n}</b> — ${s.mean}`); selWithin(b); }
});

/* defaults */
(function(){const m=CMODES[0]; setRaw('C',m.dot); cap('c-capC',m.cap); document.querySelector('[data-c="0"]').classList.add('sel');})();
(function(){const s=SIT[1]; setRaw('S',s.S); setRaw('M',s.M); cap('b-capS',`<b>${s.n}</b> — ${s.mean}`); document.querySelector('[data-s="1"]').classList.add('sel');})();
</script>
</body>
</html>
